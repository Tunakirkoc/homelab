apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: bluemap-cluster
  namespace: minecraft
spec:
  instances: 1
  storage:
    size: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bluemap
  namespace: minecraft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bluemap
  template:
    metadata:
      labels:
        app: bluemap
    spec:
      containers:
        - name: bluemap
          image: ghcr.io/tunakirkoc/homelab/bluemap:main
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
            requests:
              cpu: "200m"
              memory: "256Mi"
          env:
            - name: BLUEMAP_DB_URL
              valueFrom:
                secretKeyRef:
                  name: bluemap-cluster-app
                  key: uri
            - name: BLUEMAP_DB_USER
              valueFrom:
                secretKeyRef:
                  name: bluemap-cluster-app
                  key: username
            - name: BLUEMAP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bluemap-cluster-app
                  key: password
          ports:
            - containerPort: 8100
---
apiVersion: v1
kind: Service
metadata:
  name: bluemap
  namespace: minecraft
spec:
  selector:
    app: bluemap
  ports:
    - protocol: TCP
      port: 8100
      targetPort: 8100
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bluemap-ingress
  namespace: minecraft
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: map.kirkoc.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bluemap
                port:
                  number: 8100
  tls:
    - hosts:
        - map.kirkoc.net
      secretName: bluemap-tls